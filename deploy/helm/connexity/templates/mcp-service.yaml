{{- if .Values.mcp.enabled }}
apiVersion: v1
kind: Service
metadata:
  name: {{ include "connexity.mcp.serviceName" . }}
  labels:
    {{- include "connexity.labels" . | nindent 4 }}
    app.kubernetes.io/component: mcp
spec:
  type: ClusterIP
  selector:
    {{- include "connexity.mcp.selectorLabels" . | nindent 4 }}
  ports:
    - name: http
      port: {{ .Values.mcp.service.port }}
      targetPort: http
{{- end }}
