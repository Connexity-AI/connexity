{{- if and .Values.mcp.enabled .Values.mcp.ingress.enabled -}}
apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: {{ include "connexity.mcp.serviceName" . }}
  labels:
    {{- include "connexity.labels" . | nindent 4 }}
    app.kubernetes.io/component: mcp
  {{- with .Values.mcp.ingress.annotations }}
  annotations:
    {{- toYaml . | nindent 4 }}
  {{- end }}
spec:
  {{- if .Values.mcp.ingress.className }}
  ingressClassName: {{ .Values.mcp.ingress.className }}
  {{- end }}
  {{- if and .Values.mcp.ingress.tls.enabled .Values.mcp.ingress.tls.secretName }}
  tls:
    - hosts:
        - {{ .Values.mcp.ingress.host }}
      secretName: {{ .Values.mcp.ingress.tls.secretName }}
  {{- end }}
  rules:
    - host: {{ .Values.mcp.ingress.host }}
      http:
        paths:
          - path: /
            pathType: Prefix
            backend:
              service:
                name: {{ include "connexity.mcp.serviceName" . }}
                port:
                  number: {{ .Values.mcp.service.port }}
{{- end }}
