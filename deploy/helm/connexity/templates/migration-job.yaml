{{- if .Values.migration.enabled }}
apiVersion: batch/v1
kind: Job
metadata:
  name: {{ include "connexity.fullname" . }}-migrate
  labels:
    {{- include "connexity.labels" . | nindent 4 }}
    app.kubernetes.io/component: migration
  annotations:
    helm.sh/hook: post-install,post-upgrade
    helm.sh/hook-weight: "-5"
    helm.sh/hook-delete-policy: before-hook-creation,hook-succeeded
spec:
  backoffLimit: {{ .Values.migration.backoffLimit }}
  template:
    metadata:
      labels:
        {{- include "connexity.labels" . | nindent 8 }}
        app.kubernetes.io/component: migration
    spec:
      restartPolicy: Never
      containers:
        - name: migrate
          image: {{ include "connexity.backend.image" . }}
          imagePullPolicy: {{ .Values.backend.image.pullPolicy }}
          command:
            - bash
            - scripts/prestart.sh
          envFrom:
            - secretRef:
                name: {{ include "connexity.secretName" . }}
          env:
            - name: RUN_DB_PRESTART
              value: "1"
{{- end }}
