{{- if .Values.voice.enabled }}
apiVersion: apps/v1
kind: StatefulSet
metadata:
  name: {{ include "connexity.voice.fullname" . }}
  labels:
    {{- include "connexity.labels" . | nindent 4 }}
    app.kubernetes.io/component: voice-worker
spec:
  serviceName: {{ include "connexity.voice.fullname" . }}-headless
  replicas: 0
  podManagementPolicy: Parallel
  selector:
    matchLabels:
      {{- include "connexity.voice.selectorLabels" . | nindent 6 }}
  template:
    metadata:
      labels:
        {{- include "connexity.voice.selectorLabels" . | nindent 8 }}
    spec:
      terminationGracePeriodSeconds: {{ .Values.voice.terminationGracePeriodSeconds }}
      containers:
        - name: voice-worker
          image: "{{ .Values.voice.image.repository }}:{{ .Values.voice.image.tag }}"
          imagePullPolicy: {{ .Values.voice.image.pullPolicy }}
          ports:
            - name: http
              containerPort: {{ .Values.voice.service.port }}
              protocol: TCP
          envFrom:
            - configMapRef:
                name: {{ include "connexity.voice.fullname" . }}
            - secretRef:
                name: {{ include "connexity.secretName" . }}
          env:
            - name: POD_NAME
              valueFrom:
                fieldRef:
                  fieldPath: metadata.name
            - name: WORKER_INSTANCE_ID
              valueFrom:
                fieldRef:
                  fieldPath: metadata.name
          readinessProbe:
            httpGet:
              path: /health
              port: http
            initialDelaySeconds: 5
            periodSeconds: 10
          livenessProbe:
            httpGet:
              path: /health
              port: http
            initialDelaySeconds: 15
            periodSeconds: 20
          resources:
            {{- toYaml .Values.voice.resources | nindent 12 }}
      {{- with .Values.voice.nodeSelector }}
      nodeSelector:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      {{- with .Values.voice.affinity }}
      affinity:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      {{- with .Values.voice.tolerations }}
      tolerations:
        {{- toYaml . | nindent 8 }}
      {{- end }}
{{- end }}
