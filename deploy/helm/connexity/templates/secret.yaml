{{- if .Values.secret.create }}
apiVersion: v1
kind: Secret
metadata:
  name: {{ include "connexity.fullname" . }}
  labels:
    {{- include "connexity.labels" . | nindent 4 }}
type: Opaque
stringData:
  POSTGRES_SERVER: {{ include "connexity.postgres.host" . | quote }}
  POSTGRES_PORT: {{ include "connexity.postgres.port" . | quote }}
  POSTGRES_USER: {{ include "connexity.postgres.user" . | quote }}
  POSTGRES_PASSWORD: {{ include "connexity.postgres.password" . | quote }}
  POSTGRES_DB: {{ include "connexity.postgres.database" . | quote }}
  {{- if .Values.externalDatabase.url }}
  DATABASE_URL: {{ .Values.externalDatabase.url | quote }}
  {{- end }}
  JWT_SECRET_KEY: {{ .Values.secret.jwtSecretKey | quote }}
  ENCRYPTION_KEY: {{ .Values.secret.encryptionKey | quote }}
  {{- if .Values.secret.twilioAccountSid }}
  TWILIO_ACCOUNT_SID: {{ .Values.secret.twilioAccountSid | quote }}
  {{- end }}
  {{- if .Values.secret.twilioAuthToken }}
  TWILIO_AUTH_TOKEN: {{ .Values.secret.twilioAuthToken | quote }}
  {{- end }}
  {{- if .Values.secret.twilioFromNumber }}
  TWILIO_FROM_NUMBER: {{ .Values.secret.twilioFromNumber | quote }}
  {{- end }}
  {{- if .Values.secret.openaiApiKey }}
  OPENAI_API_KEY: {{ .Values.secret.openaiApiKey | quote }}
  {{- end }}
  {{- if .Values.secret.deepgramApiKey }}
  DEEPGRAM_API_KEY: {{ .Values.secret.deepgramApiKey | quote }}
  {{- end }}
  {{- if .Values.secret.elevenlabsApiKey }}
  ELEVENLABS_API_KEY: {{ .Values.secret.elevenlabsApiKey | quote }}
  {{- end }}
  {{- if .Values.secret.cartesiaApiKey }}
  CARTESIA_API_KEY: {{ .Values.secret.cartesiaApiKey | quote }}
  {{- end }}
{{- end }}
