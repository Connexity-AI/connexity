apiVersion: v1
kind: ConfigMap
metadata:
  name: {{ include "connexity.fullname" . }}-backend
  labels:
    {{- include "connexity.labels" . | nindent 4 }}
    app.kubernetes.io/component: backend
data:
  ENVIRONMENT: {{ .Values.backend.env.environment | quote }}
  PROJECT_NAME: {{ .Values.backend.env.projectName | quote }}
  SITE_URL: {{ .Values.global.siteUrl | quote }}
  OAUTH_ISSUER_URL: {{ .Values.global.apiPublicUrl | quote }}
  BACKEND_CORS_ORIGINS: {{ .Values.global.siteUrl | quote }}
  RUN_DB_PRESTART: "0"
  {{- if .Values.voice.enabled }}
  VOICE_DEPLOYMENT_MODE: kubernetes
  VOICE_MAX_CONCURRENCY: {{ .Values.voice.maxConcurrency | quote }}
  {{- else }}
  VOICE_DEPLOYMENT_MODE: "off"
  {{- end }}
  {{- if and .Values.mcp.enabled .Values.mcp.env.mcpOauthAudience }}
  MCP_OAUTH_AUDIENCE: {{ .Values.mcp.env.mcpOauthAudience | quote }}
  OAUTH_DEFAULT_RESOURCE_URL: {{ .Values.mcp.env.mcpOauthAudience | quote }}
  {{- end }}
