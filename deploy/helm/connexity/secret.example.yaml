# Example Secret — copy, fill values, and apply before install when secret.create=false.
# Do not commit real credentials.
#
#   kubectl create namespace connexity
#   kubectl apply -f connexity-secrets.yaml
#
apiVersion: v1
kind: Secret
metadata:
  name: connexity-secrets
  namespace: connexity
type: Opaque
stringData:
  POSTGRES_SERVER: connexity-postgresql
  POSTGRES_PORT: "5432"
  POSTGRES_USER: postgres
  POSTGRES_PASSWORD: change-me
  POSTGRES_DB: app
  JWT_SECRET_KEY: change-me
  ENCRYPTION_KEY: change-me
  TWILIO_ACCOUNT_SID: ACxxxxxxxx
  TWILIO_AUTH_TOKEN: change-me
  TWILIO_FROM_NUMBER: "+15551234567"
  OPENAI_API_KEY: sk-...
  DEEPGRAM_API_KEY: change-me
  ELEVENLABS_API_KEY: change-me
